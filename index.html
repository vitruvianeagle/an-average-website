<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Average Website</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --border: #d8d6cf;
  --text: #1a1917; --text-muted: #7a7870;
  --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  --red: #9b2226; --green: #2d6a4f; --amber: #c77b00;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; min-height: 100vh; }

/* HEADER */
header { border-bottom: 1.5px solid var(--text); padding: 0 32px; display: flex; align-items: stretch; justify-content: space-between; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; flex-direction: column; justify-content: center; padding: 18px 0; border-right: 1px solid var(--border); padding-right: 28px; }
.site-title { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
.site-subtitle { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; margin-top: 3px; }
.header-meta { display: flex; align-items: center; gap: 32px; padding: 18px 0; padding-left: 28px; flex: 1; }
.meta-item { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
.meta-item span { display: block; color: var(--text); font-weight: 500; margin-top: 2px; }

/* TICKER */
.ticker-wrap { overflow: hidden; height: 30px; display: flex; align-items: center; background: var(--text); color: var(--bg); }
.ticker-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; padding: 0 14px; border-right: 1px solid rgba(255,255,255,0.15); white-space: nowrap; flex-shrink: 0; opacity: 0.7; }
.ticker-track { display: flex; animation: ticker 40s linear infinite; white-space: nowrap; }
.ticker-item { font-family: var(--mono); font-size: 10px; padding: 0 24px; letter-spacing: 0.03em; }
.ticker-item .tlabel { opacity: 0.45; margin-right: 5px; font-size: 9px; }
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* LAYOUT */
main { padding: 28px 32px; max-width: 1500px; margin: 0 auto; }

.section-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; padding-bottom: 7px; border-bottom: 1px solid var(--border); margin-top: 36px; }
.section-header:first-of-type { margin-top: 0; }
.section-title { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; }
.section-meta { font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.03em; }
.section-sources { font-family: var(--mono); font-size: 8px; color: var(--text-muted); letter-spacing: 0.04em; margin-left: auto; opacity: 0.6; text-transform: uppercase; }

/* GRID */
.grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 4px; }
.g4 { grid-template-columns: repeat(4, 1fr); }
.g5 { grid-template-columns: repeat(5, 1fr); }

.card { background: var(--surface); padding: 18px 20px 16px; position: relative; min-height: 86px; display: flex; flex-direction: column; }
.card-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 9px; line-height: 1.4; }
.card-value { font-family: var(--mono); font-size: 20px; font-weight: 400; letter-spacing: -0.01em; line-height: 1; margin-bottom: 5px; }
.card-source { font-family: var(--mono); font-size: 8px; color: var(--text-muted); opacity: 0.45; text-transform: uppercase; letter-spacing: 0.06em; margin-top: auto; padding-top: 12px; }
.card-source a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s, opacity 0.15s; }
.card-source a:hover { opacity: 1; border-bottom-color: var(--text-muted); }

/* FOOTER */
footer { border-top: 1.5px solid var(--text); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; margin-top: 36px; }
.footer-note { font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.04em; }
#status { font-family: var(--mono); font-size: 9px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
.dot.loading { background: var(--amber); animation: blink 0.8s ease-in-out infinite; }
.dot.done { background: var(--green); }
.dot.error { background: var(--red); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
@media(max-width:1100px){ .g5{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(2,1fr)} }
@media(max-width:700px){ .g5,.g4{grid-template-columns:repeat(2,1fr)} main{padding:20px} header{padding:0 20px;flex-wrap:wrap} .section-sources{display:none} }
@media(max-width:480px){ .g5,.g4{grid-template-columns:1fr} }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="site-title">An Average Website</div>
    <div class="site-subtitle">The world, averaged. Automated daily.</div>
  </div>
  <div class="header-meta">
    <div class="meta-item">Date<span id="hdr-date">—</span></div>
    <div class="meta-item">Refreshed<span id="hdr-time">—</span></div>
    <div class="meta-item">Categories<span id="hdr-cats">—</span></div>
    <div class="meta-item">Data points<span id="hdr-pts">—</span></div>
  </div>
</header>

<div class="ticker-wrap">
  <div class="ticker-label">Currently #1</div>
  <div style="overflow:hidden;flex:1"><div class="ticker-track" id="ticker-track">
    <span class="ticker-item">Awaiting live trend data...</span>
  </div></div>
</div>

<main id="main-content">
    <div style="padding: 40px; font-family: var(--mono); font-size: 12px; color: var(--text-muted);">
        Awaiting automated data payload...
    </div>
</main>

<footer>
  <div class="footer-note">All figures are averages, medians, or statistical means. Pipeline automated daily.</div>
  <div id="status"><div class="dot loading" id="status-dot"></div><span id="status-text">Fetching data...</span></div>
</footer>

<script>
function renderData() {
    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error('Failed to load data file');
            return response.json();
        })
        .then(data => {
            // Header Stats
            const dateObj = new Date(data.last_updated);
            document.getElementById('hdr-date').textContent = dateObj.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
            document.getElementById('hdr-time').textContent = dateObj.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
            document.getElementById('hdr-cats').textContent = data.categories.length;
            
            let totalPoints = 0;
            data.categories.forEach(cat => totalPoints += cat.items.length);
            document.getElementById('hdr-pts').textContent = totalPoints;

            // Render Ticker
            if (data.trending && data.trending.length > 0) {
                const tickerItems = [...data.trending, ...data.trending, ...data.trending]; 
                document.getElementById('ticker-track').innerHTML = tickerItems.map(item => `
                    <span class="ticker-item"><span class="tlabel">${item.label}</span>${item.value}</span>
                `).join('');
            }

            // Render Grids
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = ''; 

            data.categories.forEach(category => {
                let numCols = category.items.length === 4 ? 4 : 5; 
                
                const sectionHTML = `
                    <div class="section-header">
                      <div class="section-title">${category.title}</div>
                      <div class="section-meta">${category.meta}</div>
                      <div class="section-sources">${category.sources}</div>
                    </div>
                    <div class="grid g${numCols}">
                        ${category.items.map(item => `
                            <div class="card">
                                <div class="card-label">${item.name}</div>
                                <div class="card-value">${item.value}</div>
                                <div class="card-source">${
                                    item.url
                                        ? `<a href="${item.url}" target="_blank" rel="noopener">${item.source}</a>`
                                        : item.source
                                }</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                mainContent.insertAdjacentHTML('beforeend', sectionHTML);
            });

            document.getElementById('status-dot').className = 'dot done';
            document.getElementById('status-text').textContent = 'Live data loaded';
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('status-dot').className = 'dot error';
            document.getElementById('status-text').textContent = 'Error loading data';
        });
}

renderData();
</script>
</body>
</html>
